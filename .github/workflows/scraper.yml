name: Yutulu Website Scraper

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run incremental update
        run: |
          python scripts/incremental_update.py

      - name: Fix subcategories
        run: |
          python scripts/fix_subcategories.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/ scripts/.last_update.json
          git diff --staged --quiet || git commit -m "Update products data from Yutulu [skip ci]"
          git push